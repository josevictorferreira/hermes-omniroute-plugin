name: omniroute
version: 0.3.5
description: "Omniroute backends for Hermes: image generation (/v1/images/generations), web search (/v1/search), text-to-speech (/v1/audio/speech), speech-to-text (/v1/audio/transcriptions), video generation (/v1/videos/generations) via the OpenAI-compatible Omniroute router."
author: Jose Victor
kind: backend
provides_web_providers:
  - omniroute
requires_env:
  - OMNIROUTE_API_KEY
  - OMNIROUTE_BASE_URL
  - OMNIROUTE_TOKEN
