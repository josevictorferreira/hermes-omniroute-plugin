name: Branch Created Tests

on:
  create:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('tests/pytest.ini') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Run tests
        run: |
          pytest tests/ test_dashboard_api.py \
            -v \
            --tb=short \
            --junitxml=junit-${{ matrix.python-version }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: junit-${{ matrix.python-version }}.xml
          retention-days: 30

      - name: Publish test summary
        if: always()
        run: |
          echo "## Test results (Python ${{ matrix.python-version }})" >> "$GITHUB_STEP_SUMMARY"
          python -m pip install junitparser --quiet
          python -c "
          from junitparser import JUnitXml
          import sys, pathlib
          results = pathlib.Path('junit-${{ matrix.python-version }}.xml')
          if not results.exists():
              print('No results file found.')
              sys.exit(0)
          xml = JUnitXml.fromfile(str(results))
          total = passed = failures = errors = skipped = 0
          for suite in xml:
              for case in suite:
                  total += 1
                  if case.result:
                      for r in case.result:
                          if r.type == 'failure': failures += 1
                          elif r.type == 'error': errors += 1
                          elif r.type == 'skipped': skipped += 1
                  else:
                      passed += 1
          print(f'| {total} | {passed} | {failures} | {errors} | {skipped} |')
          print(f'|---|---|---|---|---|')
          print(f'| **Total** | **{passed}** | **{failures}** | **{errors}** | **{skipped}** |')
          sys.exit(1 if (failures + errors) > 0 else 0)
          " >> "$GITHUB_STEP_SUMMARY" || true
